kind = "web"
previewPath = "/"
title = "GaLan Web Studios"
version = "1.0.0"
id = "artifacts/galan-web-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19626

[services.development]
run = "pnpm --filter @workspace/galan-web-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/galan-web-studios", "run", "build" ]
publicDir = "artifacts/galan-web-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19626"
BASE_PATH = "/"
